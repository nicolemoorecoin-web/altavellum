services:
  - type: web
    name: altavellum
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn harmo.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: harmo.settings
    autoDeploy: true
    build:
      runtime: python-3.10